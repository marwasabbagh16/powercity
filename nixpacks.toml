[phases.setup]
nixPkgs = ["php82", "php82Extensions.intl", "php82Extensions.sodium", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.opcache"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --ignore-platform-reqs"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"